# Multi-Model TTS Service - Kokoro + TADA + Qwen3
# OpenAI-compatible TTS API with 3 models
#
# GPU: RTX 3090 (24GB) - shares GPU with other services
# Gateway Port: 8196
# URL: tts-multi.myia.io

services:
  # Gateway - Routes requests to appropriate TTS model
  tts-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: tts-gateway
    hostname: tts-gateway

    ports:
      - "${TTS_GATEWAY_PORT:-8196}:8000"

    environment:
      - PYTHONUNBUFFERED=1
      - KOKORO_SERVICE_URL=http://tts-kokoro:8000
      - TADA_SERVICE_URL=http://tts-tada:8000
      - QWEN_SERVICE_URL=http://tts-qwen:8000
      - TZ=${TZ:-Europe/Paris}

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; print(urllib.request.urlopen('http://localhost:8000/health').read().decode())\" | grep -q healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    restart: unless-stopped

    networks:
      - tts-network

    depends_on:
      tts-kokoro:
        condition: service_healthy
      tts-tada:
        condition: service_healthy
      tts-qwen:
        condition: service_started  # Qwen takes 3-5min to load, don't block gateway

  # Kokoro TTS - Existing model, backward compatible
  tts-kokoro:
    build:
      context: ./kokoro
      dockerfile: Dockerfile
    container_name: tts-kokoro
    hostname: tts-kokoro

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${KOKORO_GPU_ID:-1}']
              capabilities: [gpu]

    volumes:
      - type: bind
        source: ${MODELS_PATH:-./models}
        target: /app/models
      - type: volume
        source: kokoro-cache
        target: /root/.cache

    environment:
      - CUDA_VISIBLE_DEVICES=${KOKORO_GPU_ID:-1}
      - NVIDIA_VISIBLE_DEVICES=${KOKORO_GPU_ID:-1}
      - PYTHONUNBUFFERED=1
      - TTS_DEVICE=cuda
      - DEFAULT_TTS_MODEL=kokoro
      - DEFAULT_TTS_VOICE=af_sky
      - SAMPLE_RATE=24000
      - PRELOAD_MODEL=${PRELOAD_MODEL:-true}
      - IDLE_TIMEOUT=${IDLE_TIMEOUT:-1200}
      - TZ=${TZ:-Europe/Paris}

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; print(urllib.request.urlopen('http://localhost:8000/health').read().decode())\" | grep -q healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    restart: unless-stopped

    networks:
      - tts-network

    # Expose only internally (not to host)
    expose:
      - "8000"

  # TADA 3B ML - HumeAI's advanced TTS model
  tts-tada:
    build:
      context: ./tada
      dockerfile: Dockerfile
    container_name: tts-tada
    hostname: tts-tada

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${TADA_GPU_ID:-1}']
              capabilities: [gpu]

    volumes:
      - type: bind
        source: ${MODELS_PATH:-./models}
        target: /app/models
      - type: volume
        source: tada-cache
        target: /root/.cache

    environment:
      - CUDA_VISIBLE_DEVICES=${TADA_GPU_ID:-1}
      - NVIDIA_VISIBLE_DEVICES=${TADA_GPU_ID:-1}
      - PYTHONUNBUFFERED=1
      - TTS_DEVICE=cuda
      - DEFAULT_TTS_MODEL=tada
      - SAMPLE_RATE=24000
      - PRELOAD_MODEL=${PRELOAD_MODEL:-true}
      - IDLE_TIMEOUT=${IDLE_TIMEOUT:-1200}
      - TZ=${TZ:-Europe/Paris}
      - HUGGING_FACE_HUB_TOKEN=${HUGGINGFACE_TOKEN}
      - HF_TOKEN=${HUGGINGFACE_TOKEN}
      - KOKORO_SERVICE_URL=http://tts-kokoro:8000

    depends_on:
      tts-kokoro:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; print(urllib.request.urlopen('http://localhost:8000/health').read().decode())\" | grep -q healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s

    restart: unless-stopped

    networks:
      - tts-network

    expose:
      - "8000"

  # Qwen3 TTS - Via vLLM-Omni
  tts-qwen:
    build:
      context: ./qwen
      dockerfile: Dockerfile
    container_name: tts-qwen
    hostname: tts-qwen

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${QWEN_GPU_ID:-1}']
              capabilities: [gpu]

    volumes:
      - type: bind
        source: ${MODELS_PATH:-./models}
        target: /app/models
      - type: volume
        source: qwen-cache
        target: /root/.cache

    environment:
      - CUDA_VISIBLE_DEVICES=${QWEN_GPU_ID:-1}
      - NVIDIA_VISIBLE_DEVICES=${QWEN_GPU_ID:-1}
      - PYTHONUNBUFFERED=1
      - MODEL_TYPE=${QWEN_MODEL_TYPE:-CustomVoice}
      - GPU_MEMORY_UTILIZATION=${QWEN_GPU_MEMORY_UTILIZATION:-0.6}
      - TZ=${TZ:-Europe/Paris}

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 240s

    restart: unless-stopped

    networks:
      - tts-network

    expose:
      - "8000"

networks:
  tts-network:
    driver: bridge
    name: tts-network

volumes:
  kokoro-cache:
    name: tts-kokoro-cache
  tada-cache:
    name: tts-tada-cache
  qwen-cache:
    name: tts-qwen-cache
