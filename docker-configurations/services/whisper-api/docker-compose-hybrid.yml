# Whisper API - Transcription audio avec faster-whisper (Hybrid Configuration)
# OpenAI-compatible API for speech-to-text
#
# Uses ghcr.io/myia-org/whisper-api:latest image (pre-built)
# With full main branch configuration (lazy loading, networks, healthchecks)
#
# GPU: RTX 3090 (24GB) - GPU 1 (po-2023)
# Port: 8190
# URL: whisper-api.myia.io

services:
  whisper-api:
    # Use pre-built image from ghcr.io instead of local build
    image: ghcr.io/myia-org/whisper-api:latest
    container_name: whisper-api
    hostname: whisper-api

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${GPU_DEVICE_ID:-1}']
              capabilities: [gpu]

    ports:
      - "${WHISPER_API_PORT:-8190}:8190"

    volumes:
      - type: bind
        source: ${MODELS_PATH:-./models}
        target: /app/models
      - type: bind
        source: ../shared
        target: /app/shared
        read_only: true
      - type: volume
        source: whisper-cache
        target: /root/.cache

    environment:
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-1}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-1}
      - PYTHONUNBUFFERED=1
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3-turbo}
      - WHISPER_DEVICE=cuda
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-float16}
      - MAX_FILE_SIZE=26214400
      - PRELOAD_MODEL=${PRELOAD_MODEL:-true}
      - IDLE_TIMEOUT=${IDLE_TIMEOUT:-1200}
      - TZ=${TZ:-Europe/Paris}
      - API_KEY=${WHISPER_API_KEY}

    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8190/health | grep -q healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    restart: unless-stopped

    networks:
      - whisper-network

    labels:
      - "com.myia.service=whisper-api"
      - "com.myia.gpu=rtx-3090"
      - "com.myia.model=faster-whisper-large-v3-turbo"

networks:
  whisper-network:
    driver: bridge
    name: whisper-network

volumes:
  whisper-cache:
    name: whisper-cache
