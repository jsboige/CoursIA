services:
  vllm-zimage:
    image: vllm/vllm-omni:v0.12.0rc1
    container_name: vllm-zimage
    user: "1000:1000"
    ipc: host
    ports:
      - "127.0.0.1:${VLLM_ZIMAGE_PORT:-8001}:8000"
    volumes:
      - ../../shared/cache/huggingface:/home/vllm/.cache/huggingface
      - ../../shared/cache/flashinfer:/home/vllm/.cache/flashinfer
      - ../../shared/models:/models:ro
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - NCCL_P2P_DISABLE=1
      # Quantization: fp8 (recommande), int8 (experimental), bfloat16 (defaut)
      - VLLM_QUANTIZATION=${VLLM_QUANTIZATION:-bfloat16}
      # Sleep mode: offload to CPU, free GPU RAM without full restart
      - VLLM_SERVER_DEV_MODE=1
      - HOME=/home/vllm
      - USER=vllm
      - LOGNAME=vllm
    # vLLM Omni serve command for Z-Image-Turbo text-to-image
    # API endpoint: /v1/chat/completions (OpenAI-compatible)
    # Supported resolutions: 1328x1328, 1664x928, 928x1664, 1472x1140, etc.
    # Note: L'entrypoint de l'image est deja "vllm serve --omni", on passe juste les arguments
    # Optimizations: GPU memory utilization reduced for coexistence with forge-turbo
    # Quantization: FP8 reduces VRAM from ~10GB to ~5GB (50% savings)
    command:
      - "Tongyi-MAI/Z-Image-Turbo"
      - "--served-model-name"
      - "z-image"
      - "--port"
      - "8000"
      - "--dtype"
      - "${VLLM_QUANTIZATION:-bfloat16}"
      - "--trust-remote-code"
      - "--gpu-memory-utilization"
      - "0.35"
      - "--max-num-seqs"
      - "2"
      - "--vae-use-slicing"
      - "--vae-use-tiling"
      - "--api-key"
      - "${VLLM_API_KEY:-}"
      - "--enable-sleep-mode"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    restart: unless-stopped
    networks:
      - genai-network
    labels:
      - "com.myia.service=vllm-zimage"
      - "com.myia.gpu=rtx-3090"
      - "com.myia.model=z-image-turbo"

  # Sidecar: Idle Monitor - Stop container after inactivity
  idle-monitor:
    build:
      context: ../shared
      dockerfile: Dockerfile.idle-monitor
    container_name: vllm-zimage-idle-monitor
    hostname: vllm-zimage-idle-monitor

    environment:
      - HEALTH_URL=http://vllm-zimage:8000/health
      - CONTAINER_NAME=vllm-zimage
      - IDLE_TIMEOUT=${IDLE_TIMEOUT:-1800}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-120}
      - STARTUP_GRACE=${STARTUP_GRACE:-600}
      # IDLE_ACTION=sleep  # vLLM-omni diffusion doesn't support native sleep — use docker stop
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-Europe/Paris}

    working_dir: /app

    command: ["python", "service_idle_monitor.py"]

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    depends_on:
      vllm-zimage:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - genai-network

    labels:
      - "com.myia.service=vllm-zimage-idle-monitor"
      - "com.myia.type=sidecar"

networks:
  genai-network:
    external: true
    name: genai-network
