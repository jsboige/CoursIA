version: '3.8'

services:
  sd-forge-main:
    build: .
    image: sd-forge-main:latest
    container_name: sd-forge-main
    hostname: sd-forge-main
    ports:
      - "7860:7860"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - WEB_USER=${FORGE_USER:-admin}
      - WEB_PASSWORD=${FORGE_PASSWORD:-changeme}
      - FORGE_ARGS=--api --api-log --listen --gradio-auth ${FORGE_USER:-admin}:${FORGE_PASSWORD:-changeme} --gpu-device-id 1 --xformers --skip-install
    volumes:
      - ../../shared/models:/opt/storage/stable_diffusion/models
      - ../../shared/outputs:/opt/storage/stable_diffusion/outputs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    stdin_open: true
    tty: true
