# Pre-commit hooks for CoursIA
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: Secret scanner (gitleaks)
        args: ['detect', '--no-git', '--redact']

  # Local hooks: notebook hygiene + structural integrity. These run on the
  # worker's machine without external dependencies. See
  # docs/reference/regles-validation-detail.md for H.3 (execution_count != null)
  # and the #6309 / #2727 / #2733 probeAddresses banner regression post-mortem.
  - repo: local
    hooks:
      - id: strip-probeaddresses-banner
        name: Strip .NET probeAddresses banner from staged notebooks
        description: |
          Removes the dotnet-interactive probeAddresses HTTP-bootstrap banner
          (data["text/html"] outputs containing probeAddresses / probingAddresses /
          loadDotnetInteractiveApi). The banner leaks the worker's network
          interfaces (LAN IPv4, WSL/Docker bridge, link-local IPv6, public IPv6
          GUA) at every kernel re-execution. Output-only strip — no source
          change, execution_count preserved, see #2727/#2733/#6309.
        entry: python scripts/notebook_tools/strip_probe_banner.py --apply
        language: system
        pass_filenames: true
        files: '\.ipynb$'
        stages: [pre-commit]

      - id: strip-machine-username-paths
        name: Strip machine-username path leaks from notebook outputs
        description: |
          Removes path-based username leaks from cell outputs across multiple
          runtimes (category-A kernel-injected / env-dependent leaks of rule-6
          secrets-hygiene, durable fix = output-only pre-commit strip — no
          source change, execution_count preserved). Path-based detection
          (NOT signature-based) keys on `C:\Users\<u>` + a runtime-specific
          cache-context token:

            - nuget      : `\.nuget\packages\...`           (dotnet-interactive ext-load, #6537)
            - pip        : `AppData\Roaming\Python\...`     (peft / torch import warnings)
            - ipykernel  : `AppData\Local\Temp\ipykernel_`  (deprecation warnings)
            - conda      : `\.conda\envs\...`               (deprecated nn.utils warnings)
            - hfcache    : `\.cache\huggingface\...`        (HF download warnings)

          Tilde HOME placeholder (`~\.nuget\packages\...`) carries no username
          and is left untouched. See #6529 (4th strip-hook) and #6443.
        entry: python scripts/notebook_tools/strip_machine_paths.py --apply
        language: system
        pass_filenames: true
        files: '\.ipynb$'
        stages: [pre-commit]
