# Pre-commit hooks for CoursIA
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: Secret scanner (gitleaks)
        args: ['detect', '--no-git', '--redact']

  # Local hooks: notebook hygiene + structural integrity. These run on the
  # worker's machine without external dependencies. See
  # docs/reference/regles-validation-detail.md for H.3 (execution_count != null)
  # and the #6309 / #2727 / #2733 probeAddresses banner regression post-mortem.
  - repo: local
    hooks:
      - id: strip-probeaddresses-banner
        name: Strip .NET probeAddresses banner from staged notebooks
        description: |
          Removes the dotnet-interactive probeAddresses HTTP-bootstrap banner
          (data["text/html"] outputs containing probeAddresses / probingAddresses /
          loadDotnetInteractiveApi). The banner leaks the worker's network
          interfaces (LAN IPv4, WSL/Docker bridge, link-local IPv6, public IPv6
          GUA) at every kernel re-execution. Output-only strip — no source
          change, execution_count preserved, see #2727/#2733/#6309.
        entry: python scripts/notebook_tools/strip_probe_banner.py --apply
        language: system
        pass_filenames: true
        files: '\.ipynb$'
        stages: [pre-commit]

      - id: strip-dotnet-nuget-ext
        name: Strip .NET 'Loading extensions from <NuGet cache>' machine-username leak
        description: |
          Removes the dotnet-interactive extension-load message
          (data["text/plain"] outputs of the form "Loading extensions from
          `C:\Users\<user>\.nuget\packages\...`") that leaks the worker's
          machine username via the local NuGet package-cache path. The message
          is re-injected at every kernel re-execution (category-A kernel-injected
          leak of rule-6 secrets-hygiene), so the durable fix is this output-only
          pre-commit strip — no source change, execution_count preserved.
          See #6529 (4th strip-hook) and #6443.
        entry: python scripts/notebook_tools/strip_machine_paths.py --apply
        language: system
        pass_filenames: true
        files: '\.ipynb$'
        stages: [pre-commit]

      - id: scrub-papermill-paths
        name: Scrub absolute papermill input/output paths from staged notebooks
        description: |
          Rewrites metadata.papermill.input_path / output_path from an absolute
          machine-local path (C:\Users\<user>\..., /home/<user>/..., WSL/temp
          dirs) down to the notebook basename. Papermill records the absolute
          --output path it was handed into the notebook metadata at EVERY
          execution, so this machine-path leak is re-injected on each
          re-execution regardless of the launcher (batch_reexecute, wsl_papermill,
          or a hand-typed `papermill --output /abs/path`). Hand-patching it per
          notebook is a treadmill wiped by the next run; this metadata-only
          pre-commit strip is the durable owner (mirrors the probeAddresses and
          NuGet-cache strip hooks above). Byte-surgical text edit: source cells,
          outputs and execution_count are untouched. See #3436.
        entry: python scripts/notebook_tools/scrub_papermill_paths.py --apply
        language: system
        pass_filenames: true
        files: '\.ipynb$'
        stages: [pre-commit]

      - id: markdown-rendering-guard
        name: Block NEW oversized markdown-rendering defects (frontmatter / setext)
        description: |
          Fails the commit if a staged notebook introduces a markdown cell that
          renders as an oversized, unformatted text block: YAML frontmatter dumped
          into a rendered cell (`---\ntitle:...\ncost:\n  ...\n---`, promoted to a
          setext-H2 supersize by markdown-it) or prose accidentally underlined by
          `---`/`===`. These look fine in a source diff but ugly on first open, and
          an agent cannot render markdown in its head to catch them. Baselined
          against ~480 pre-existing violations (scripts/notebook_tools/
          markdown_rendering_baseline.json) so only NEW error-level defects block;
          burn the baseline down with --update-baseline after a remediation batch.
          Whole-tree scan (pass_filenames:false) so cross-cell context is intact.
          See the cost-frontmatter exemplar #8323 and #8056.
        entry: python scripts/notebook_tools/detect_markdown_rendering.py --check --baseline scripts/notebook_tools/markdown_rendering_baseline.json
        language: system
        pass_filenames: false
        files: '\.ipynb$'
        stages: [pre-commit]
