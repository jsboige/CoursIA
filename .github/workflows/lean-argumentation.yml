name: Lean CI (argumentation_lean)

# CI for argumentation_lean (SymbolicAI/Tweety/argumentation_lean) — Dung (1995)
# abstract argumentation lake, companion formalization of the Tweety-5 notebook.
# First module: Argumentation. Knaster–Tarski grounded extension, Dung Fundamental
# Lemma, the 5-semantics hierarchy — all 0 sorry. See argumentation_lean/README.md.
#
# sorry-filter-mode=standalone-tactic, baseline=0: the library is fully sorry-free;
# this guards that NO new standalone `sorry` tactic is introduced (never
# false-positives on the prose mentions of "sorry-free"/"sans sorry"; catches any
# NEW standalone sorry). The "grounded is itself complete" milestone (Dung
# Proposition 11, finite stabilization) is documented OPEN, NOT sorry-backed.

on:
  push:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/SymbolicAI/Tweety/argumentation_lean/**.lean'
      - 'MyIA.AI.Notebooks/SymbolicAI/Tweety/argumentation_lean/lakefile.lean'
      - 'MyIA.AI.Notebooks/SymbolicAI/Tweety/argumentation_lean/lakefile.toml'
      - 'MyIA.AI.Notebooks/SymbolicAI/Tweety/argumentation_lean/lean-toolchain'
  pull_request:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/SymbolicAI/Tweety/argumentation_lean/**.lean'
      - 'MyIA.AI.Notebooks/SymbolicAI/Tweety/argumentation_lean/lakefile.lean'
      - 'MyIA.AI.Notebooks/SymbolicAI/Tweety/argumentation_lean/lakefile.toml'
      - 'MyIA.AI.Notebooks/SymbolicAI/Tweety/argumentation_lean/lean-toolchain'
  workflow_dispatch:

jobs:
  ci:
    uses: jsboige/CoursIA/.github/workflows/lean-build.yml@main
    with:
      project-path: MyIA.AI.Notebooks/SymbolicAI/Tweety/argumentation_lean
      display-name: argumentation_lean
      sorry-baseline: "0"
      sorry-filter-mode: standalone-tactic
