name: ML & Prover Tests

on:
  push:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/QuantConnect/ML-Training-Pipeline/scripts/**'
      - 'tests/**'
      - 'pytest.ini'
      - '.github/workflows/ml-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/QuantConnect/ML-Training-Pipeline/scripts/**'
      - 'tests/**'
      - 'pytest.ini'
      - '.github/workflows/ml-tests.yml'
  workflow_dispatch:

jobs:
  ml-tests:
    name: ML Pipeline Tests (CPU)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy scikit-learn arch pytest pyarrow xgboost joblib
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        # Scope to the ML pipeline suite this job is named for. The repo-wide
        # pytest.ini testpaths pull in scripts/ suites (genai, wsl, catalog)
        # whose deps (requests, bcrypt, jupyter_client) are not installed here
        # and which have been failing on main since 2026-06-03 — tracked
        # separately; they need their own properly-provisioned workflow.
        run: pytest MyIA.AI.Notebooks/QuantConnect/ML-Training-Pipeline/scripts/tests --tb=short -v

  prover-tests:
    name: Prover Tests (placeholder)
    runs-on: ubuntu-latest
    if: false  # Enable when tests/prover/ has tests
    steps:
      - run: echo "Prover tests not yet available"
