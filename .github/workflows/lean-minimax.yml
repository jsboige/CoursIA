name: Lean CI (minimax_lean)

# CI for minimax_lean (GameTheory/minimax_lean) — zero-sum games: bilinear payoff
# xᵀAy and the analytical core of the von Neumann minimax theorem. Specialization of
# the GameTheory series to the zero-sum setting (Nash already in lean_game_defs).
#
# This first deliverable proves the FORMAL CORE (roadmap #4038, issue #4054):
# bilinearity of the payoff (additivity + homogeneity in each variable) and joint +
# restricted continuity — the properties that carry the four Sion hypotheses.
# The full Sion application on stdSimplex (compactness/convexity of the simplex +
# affine⇒quasi-convex/quasi-concave + continuous⇒LSC/USC) is the OPEN next milestone,
# honestly documented (NOT sorry-stubbed).
#
# sorry-filter-mode=standalone-tactic, baseline=0: the library is fully sorry-free;
# this guards that NO new standalone `sorry` tactic is introduced (never
# false-positives on prose mentions of "0-sorry"/"sans sorry"; catches any NEW
# standalone sorry). All proved lemmas (bilinearity, continuity) are 0-sorry.

on:
  push:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/GameTheory/minimax_lean/**.lean'
      - 'MyIA.AI.Notebooks/GameTheory/minimax_lean/lakefile.lean'
      - 'MyIA.AI.Notebooks/GameTheory/minimax_lean/lakefile.toml'
      - 'MyIA.AI.Notebooks/GameTheory/minimax_lean/lean-toolchain'
  pull_request:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/GameTheory/minimax_lean/**.lean'
      - 'MyIA.AI.Notebooks/GameTheory/minimax_lean/lakefile.lean'
      - 'MyIA.AI.Notebooks/GameTheory/minimax_lean/lakefile.toml'
      - 'MyIA.AI.Notebooks/GameTheory/minimax_lean/lean-toolchain'
  workflow_dispatch:

jobs:
  ci:
    uses: jsboige/CoursIA/.github/workflows/lean-build.yml@main
    with:
      project-path: MyIA.AI.Notebooks/GameTheory/minimax_lean
      display-name: minimax_lean
      sorry-baseline: "0"
      sorry-filter-mode: standalone-tactic
