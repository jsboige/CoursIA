name: Lean Game Defs CI

# CI for lean_game_defs (GameTheory/lean_game_defs).
# Shared core-Lean-only game theory definitions (Basic, Nash, Bayesian,
# Combinatorial, SocialChoice, Regret) referenced by GT-16..GT-19 notebooks.
# Rule lean-merge-discipline: lake build SUCCESS local OBLIGATOIRE avant merge.
#
# Harness added per ai-01 review on PR #2752 (fixes #2748): these files were
# shipped in #2673 without any lake project, so they had never compiled.
# Baseline 0: definitions-only library, no proofs, no sorry tolerated.
#
# NOTE: uses lean-build.yml@main — requires PR #2751 (reusable workflow) to be
# merged first. Merge order: #2751 then #2752.

on:
  push:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/GameTheory/lean_game_defs/**.lean'
      - 'MyIA.AI.Notebooks/GameTheory/lean_game_defs/lakefile.toml'
      - 'MyIA.AI.Notebooks/GameTheory/lean_game_defs/lean-toolchain'
  pull_request:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/GameTheory/lean_game_defs/**.lean'
      - 'MyIA.AI.Notebooks/GameTheory/lean_game_defs/lakefile.toml'
      - 'MyIA.AI.Notebooks/GameTheory/lean_game_defs/lean-toolchain'
  workflow_dispatch:

jobs:
  ci:
    uses: jsboige/CoursIA/.github/workflows/lean-build.yml@main
    with:
      project-path: MyIA.AI.Notebooks/GameTheory/lean_game_defs
      display-name: lean_game_defs
      sorry-baseline: "0"
      sorry-filter-mode: standalone-tactic
