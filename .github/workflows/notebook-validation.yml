name: Notebook Validation

on:
  push:
    branches: [ main ]
    paths:
      - '**.ipynb'
  pull_request:
    branches: [ main ]
    paths:
      - '**.ipynb'
  workflow_dispatch:  # Allow manual triggering

jobs:
  validate-notebooks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nbformat

    - name: Validate notebook structure
      run: |
        echo "Validating notebook JSON structure and nbformat..."
        ERRORS=0
        while IFS= read -r nb; do
          python -c "
        import json, sys
        import nbformat
        path = '$nb'
        try:
            with open(path, 'r', encoding='utf-8') as f:
                nb = nbformat.read(f, as_version=4)
            nbformat.validate(nb)
            print(f'OK {path}')
        except json.JSONDecodeError as e:
            print(f'FAIL {path}: invalid JSON - {e}')
            sys.exit(1)
        except nbformat.ValidationError as e:
            print(f'WARN {path}: nbformat warning - {e.message[:100]}')
        except Exception as e:
            print(f'FAIL {path}: {e}')
            sys.exit(1)
        " || ERRORS=$((ERRORS + 1))
        done < <(find . -name "*.ipynb" -not -path "*/\.*" -not -path "*/.ipynb_checkpoints/*")

        if [ $ERRORS -gt 0 ]; then
          echo "FAILED: $ERRORS notebook(s) with errors"
          exit 1
        fi
        echo "All notebooks validated successfully"
