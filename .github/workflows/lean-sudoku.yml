name: Lean CI (sudoku_lean)

# CI for sudoku_lean (MyIA.AI.Notebooks/Sudoku/sudoku_lean) — Sudoku constraint
# propagation soundness lake (naked/hidden single, peer exclusion). Part of Lean roadmap
# #4038 Tier 3, issue #4055. Coordination with #2978 verified (no overlap: #2978's Lean
# angle is finiteness-derivatives regex termination).
#
# sorry-filter-mode=standalone-tactic, baseline=0: the module is entirely sorry-free.
# standalone-tactic counts only standalone `sorry` tokens (never prose false-positives).
# See lean-build.yml.

on:
  push:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/Sudoku/sudoku_lean/**.lean'
      - 'MyIA.AI.Notebooks/Sudoku/sudoku_lean/lakefile.lean'
      - 'MyIA.AI.Notebooks/Sudoku/sudoku_lean/lakefile.toml'
      - 'MyIA.AI.Notebooks/Sudoku/sudoku_lean/lean-toolchain'
  pull_request:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/Sudoku/sudoku_lean/**.lean'
      - 'MyIA.AI.Notebooks/Sudoku/sudoku_lean/lakefile.lean'
      - 'MyIA.AI.Notebooks/Sudoku/sudoku_lean/lakefile.toml'
      - 'MyIA.AI.Notebooks/Sudoku/sudoku_lean/lean-toolchain'
  workflow_dispatch:

jobs:
  ci:
    uses: jsboige/CoursIA/.github/workflows/lean-build.yml@main
    with:
      project-path: MyIA.AI.Notebooks/Sudoku/sudoku_lean
      display-name: sudoku_lean
      sorry-baseline: "0"
      sorry-filter-mode: standalone-tactic
