name: Lean CI (kelly_lean)

# CI for kelly_lean (QuantConnect/kelly_lean) — optimalité du critère de Kelly :
# pour un pari de Bernoulli (probabilité p de gain, cote nette b), la fraction
# optimale f* = (b·p − q)/b maximise de façon unique le taux de croissance espéré
# g(f) = p·log(1+b·f) + q·log(1−f). Prouvé via la tangente log t ≤ t − 1, sans
# recourir à la concavité abstraite. Premier Lean lake liant position sizing à un
# résultat formel (roadmap #4038 Tier 2, issue #4052).
#
# sorry-filter-mode=standalone-tactic, baseline=0 : la bibliothèque est intégralement
# sans sorry ; les deux théorèmes `kelly_optimal` (f* maximise g) et `kelly_unique`
# (sur/sous-pari strictement sous-optimaux) sont prouvés. Ce CI garde qu'AUCUN nouveau
# `sorry` tactic standalone n'est introduit (jamais de faux positif sur les mentions
# prose « 0-sorry »/« sans sorry » ; rattrape tout nouveau sorry standalone).

on:
  push:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/QuantConnect/kelly_lean/**.lean'
      - 'MyIA.AI.Notebooks/QuantConnect/kelly_lean/lakefile.lean'
      - 'MyIA.AI.Notebooks/QuantConnect/kelly_lean/lakefile.toml'
      - 'MyIA.AI.Notebooks/QuantConnect/kelly_lean/lean-toolchain'
  pull_request:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/QuantConnect/kelly_lean/**.lean'
      - 'MyIA.AI.Notebooks/QuantConnect/kelly_lean/lakefile.lean'
      - 'MyIA.AI.Notebooks/QuantConnect/kelly_lean/lakefile.toml'
      - 'MyIA.AI.Notebooks/QuantConnect/kelly_lean/lean-toolchain'
  workflow_dispatch:

jobs:
  ci:
    uses: jsboige/CoursIA/.github/workflows/lean-build.yml@main
    with:
      project-path: MyIA.AI.Notebooks/QuantConnect/kelly_lean
      display-name: kelly_lean
      sorry-baseline: "0"
      sorry-filter-mode: standalone-tactic
