name: Lean CI (learning_theory_lean)

# CI for learning_theory_lean (ML/learning_theory_lean) — convergence theorem of the
# Perceptron (Novikoff, 1962): linearly-separable data of margin γ and radius R
# ⟹ at most (R/γ)² updates. First Lean lake of the ML series (roadmap #4038).
#
# Renamed from perceptron_lean → learning_theory_lean (#4293, user mandate 2026-06-25):
# the lake is now a generalist ML-theory lake (Perceptron convergence proven today; a
# PAC-learning module is planned as a sibling under the same lake, #4294) — co-locating
# theorems to share the single ~10 Go Mathlib `.lake` build (one build per lake, not
# one per theorem). The `Perceptron` module/namespace is unchanged by the rename.
# The bound `novikoff_mistake_bound` is proved fully 0-sorry via alignment growth
# (Lemme A) + norm growth (Lemme B) + Cauchy–Schwarz.
#
# sorry-filter-mode=standalone-tactic, baseline=0: the library is fully sorry-free;
# this guards that NO new standalone `sorry` tactic is introduced (never
# false-positives on prose mentions of "0-sorry"/"sans sorry"; catches any NEW
# standalone sorry). All milestones (Novikoff bound, both growth lemmas) are proved.

on:
  push:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/ML/learning_theory_lean/**.lean'
      - 'MyIA.AI.Notebooks/ML/learning_theory_lean/lakefile.lean'
      - 'MyIA.AI.Notebooks/ML/learning_theory_lean/lakefile.toml'
      - 'MyIA.AI.Notebooks/ML/learning_theory_lean/lean-toolchain'
  pull_request:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/ML/learning_theory_lean/**.lean'
      - 'MyIA.AI.Notebooks/ML/learning_theory_lean/lakefile.lean'
      - 'MyIA.AI.Notebooks/ML/learning_theory_lean/lakefile.toml'
      - 'MyIA.AI.Notebooks/ML/learning_theory_lean/lean-toolchain'
  workflow_dispatch:

jobs:
  ci:
    uses: jsboige/CoursIA/.github/workflows/lean-build.yml@main
    with:
      project-path: MyIA.AI.Notebooks/ML/learning_theory_lean
      display-name: learning_theory_lean
      sorry-baseline: "0"
      sorry-filter-mode: standalone-tactic
