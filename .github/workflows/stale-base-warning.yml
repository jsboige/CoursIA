name: Stale Base Branch Warning

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  pull-requests: write
  issues: write

jobs:
  check-base-age:
    name: "Check base branch staleness"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check base age
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          STALE_DAYS: 14
        run: |
          git fetch origin main

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          MAIN_SHA="$(git rev-parse origin/main)"

          if [ "$BASE_SHA" = "$MAIN_SHA" ]; then
            echo "Base is up-to-date with main. No warning needed."
            # Remove existing warning if base is now current
            EXISTING=$(gh pr view "$PR_NUMBER" --comments --json comments -q '.comments[].body' 2>/dev/null | grep -c "Base Branch Stale Warning" || true)
            if [ "$EXISTING" -gt 0 ]; then
              COMMENT_ID=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/comments" --jq '.[] | select(.body | test("Base Branch Stale Warning")) | .id' 2>/dev/null | head -1)
              if [ -n "$COMMENT_ID" ]; then
                gh api "repos/${{ github.repository }}/pulls/comments/$COMMENT_ID" -X DELETE --silent 2>/dev/null || true
                echo "Removed stale warning comment (base now current)."
              fi
              gh pr edit "$PR_NUMBER" --remove-label "base-stale-14d" 2>/dev/null || true
            fi
            exit 0
          fi

          BEHIND=$(git rev-list "$BASE_SHA..origin/main" --count)

          BASE_DATE=$(git show -s --format=%ct "$BASE_SHA" 2>/dev/null || echo 0)
          MAIN_DATE=$(git show -s --format=%ct "$MAIN_SHA" 2>/dev/null || echo 0)

          if [ "$BASE_DATE" -eq 0 ] || [ "$MAIN_DATE" -eq 0 ]; then
            echo "Could not determine commit dates. Skipping."
            exit 0
          fi

          AGE_DAYS=$(( (MAIN_DATE - BASE_DATE) / 86400 ))

          echo "Base SHA: $BASE_SHA"
          echo "Main SHA: $MAIN_SHA"
          echo "Commits behind: $BEHIND"
          echo "Base age: ${AGE_DAYS} days"

          if [ "$AGE_DAYS" -le "$STALE_DAYS" ]; then
            echo "Base is ${AGE_DAYS} days old (threshold: ${STALE_DAYS}d). OK."
            exit 0
          fi

          echo "::warning::Base branch is ${AGE_DAYS} days behind main (${BEHIND} commits)"

          COMMENT_BODY="## Base Branch Stale Warning

This PR's base branch is **${AGE_DAYS} days** behind \`main\` (**${BEHIND} commits** behind).

**Risk:** Merging without rebasing may cause conflicts with ${BEHIND} commits merged since the branch was created.

**Recommended action:**
\`\`\`bash
git fetch origin main
git rebase origin/main
git push --force-with-lease
\`\`\`

Or use the GitHub **\"Update branch\"** button if available.

*Auto-generated by \`stale-base-warning\` workflow (threshold: ${STALE_DAYS} days). Updated: $(date -u +%Y-%m-%dT%H:%MZ)*"

          # Dedup: update existing comment or create new one
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/comments" --jq '.[] | select(.body | test("Base Branch Stale Warning")) | .id' 2>/dev/null | head -1)

          if [ -n "$COMMENT_ID" ]; then
            echo "$COMMENT_BODY" | gh api "repos/${{ github.repository }}/pulls/comments/$COMMENT_ID" -X PATCH -f body="$COMMENT_BODY" --input - --silent 2>/dev/null || true
            echo "Updated existing stale warning comment."
          else
            echo "$COMMENT_BODY" | gh pr comment "$PR_NUMBER" --body-file -
            echo "Posted new stale warning comment."
          fi

          gh label create "base-stale-14d" \
            --description "PR base branch is >14 days behind main" \
            --color "FFA500" --force 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --add-label "base-stale-14d"
