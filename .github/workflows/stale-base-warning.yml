name: Stale Base Branch Warning

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  pull-requests: write
  issues: write

jobs:
  check-base-age:
    name: "Check base branch staleness"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check base age
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          STALE_DAYS: 14
        run: |
          git fetch origin main

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          MAIN_SHA="$(git rev-parse origin/main)"

          if [ "$BASE_SHA" = "$MAIN_SHA" ]; then
            echo "Base is up-to-date with main. No warning needed."
            exit 0
          fi

          BEHIND=$(git rev-list "$BASE_SHA..origin/main" --count)

          BASE_DATE=$(git show -s --format=%ct "$BASE_SHA" 2>/dev/null || echo 0)
          MAIN_DATE=$(git show -s --format=%ct "$MAIN_SHA" 2>/dev/null || echo 0)

          if [ "$BASE_DATE" -eq 0 ] || [ "$MAIN_DATE" -eq 0 ]; then
            echo "Could not determine commit dates. Skipping."
            exit 0
          fi

          AGE_DAYS=$(( (MAIN_DATE - BASE_DATE) / 86400 ))

          echo "Base SHA: $BASE_SHA"
          echo "Main SHA: $MAIN_SHA"
          echo "Commits behind: $BEHIND"
          echo "Base age: ${AGE_DAYS} days"

          if [ "$AGE_DAYS" -le "$STALE_DAYS" ]; then
            echo "Base is ${AGE_DAYS} days old (threshold: ${STALE_DAYS}d). OK."
            exit 0
          fi

          echo "::warning::Base branch is ${AGE_DAYS} days behind main (${BEHIND} commits)"

          COMMENT_FILE="/tmp/stale_comment.md"
          {
            echo "## Base Branch Stale Warning"
            echo ""
            echo "This PR's base branch is **${AGE_DAYS} days** behind \`main\` (**${BEHIND} commits** behind)."
            echo ""
            echo "**Risk:** Merging without rebasing may cause conflicts with ${BEHIND} commits merged since the branch was created."
            echo ""
            echo "**Recommended action:**"
            echo "\`\`\`bash"
            echo "git fetch origin main"
            echo "git rebase origin/main"
            echo "git push --force-with-lease"
            echo "\`\`\`"
            echo ""
            echo "Or use the GitHub **\"Update branch\"** button if available."
            echo ""
            echo "*Auto-generated by \`stale-base-warning\` workflow (threshold: ${STALE_DAYS} days). Issue #451*"
          } > "$COMMENT_FILE"

          gh pr comment "$PR_NUMBER" --body-file "$COMMENT_FILE"

          gh label create "base-stale-14d" \
            --description "PR base branch is >14 days behind main" \
            --color "FFA500" --force 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --add-label "base-stale-14d"
