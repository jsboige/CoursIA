name: Lean Build (reusable)

# Reusable Lake-build + sorry-baseline CI for any Lean project in the repo.
# Extracted from the per-file workflows lean-calibration.yml (#2741),
# lean-grothendieck.yml (#2743), lean-conway.yml (#2747) per ai-01 DRY
# decision (option 2: matrix). See Epic "CI Lean lacunaire".
#
# Callers invoke this via:
#   jobs:
#     ci:
#       uses: jsboige/CoursIA/.github/workflows/lean-build.yml@main
#       with:
#         project-path:      MyIA.AI.Notebooks/SymbolicAI/Lean/grothendieck_lean
#         display-name:      grothendieck_lean
#         sorry-baseline:    "0"
#         sorry-filter-mode: prose-header   # raw | prose-header | standalone-tactic | tactic
#
# Sorry-filter modes (chosen per project's sorry "profile"):
#   raw               : grep -c "sorry"                          (every mention)
#   prose-header      : grep "sorry" | grep -viE "sorries|sorry.s"   (excludes prose plural/possessive)
#   standalone-tactic : sorry as the sole tactic token on a line, INCLUDING the
#                       Lean case-bullet form `· sorry` (U+00B7), which a bare
#                       `^\s*sorry\s*$` silently dropped (blind spot, See #2747)
#   tactic            : strip the case-bullet (·) AND any trailing inline comment
#                       (`-- ...`), then count lines that are exactly `sorry`. This
#                       catches the bullet+comment fixture form `· sorry -- comment`
#                       that standalone-tactic misses, while excluding prose mentions
#                       of "sorry" in docstrings/comments. (See #5120.)
# Use raw only when sorry ALWAYS means tactic (no prose mentions). Use prose-header
# when the only non-tactic mentions are "sorries"/"sorry's" in header comments.
# Use standalone-tactic when there are MANY prose mentions of "sorry" mixed with
# real tactic sorries (e.g. Conway block comments). Use tactic when the project's
# real sorries carry a trailing inline comment (`· sorry -- ...`) AND prose also
# mentions "sorry" (e.g. calibration_lean's bilingual P4 docstrings, See #5120).
# Choose the mode whose baseline is robust to editing comments in that project.

on:
  workflow_call:
    inputs:
      project-path:
        description: "Repo-relative path to the lake project root"
        type: string
        required: true
      display-name:
        description: "Human-readable project name (for job labels)"
        type: string
        required: true
      sorry-baseline:
        description: "Known-good standalone/real sorry count (regression floor)"
        type: string
        required: true
      sorry-filter-mode:
        description: "How to count sorry: raw | prose-header | standalone-tactic | tactic"
        type: string
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: "Lean CI (${{ inputs.display-name }})"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Sorry check (${{ inputs.display-name }})
      working-directory: ${{ inputs.project-path }}
      run: |
        set -eu
        MODE="${{ inputs.sorry-filter-mode }}"
        BASELINE="${{ inputs.sorry-baseline }}"
        echo "=== Sorry inventory for ${{ inputs.display-name }} (mode: $MODE, baseline: $BASELINE) ==="
        SORRY_TOTAL=0
        for f in $(find . -name '*.lean' -not -path './.lake/*'); do
          if [ -f "$f" ]; then
            case "$MODE" in
              raw)
                COUNT=$(grep -c "sorry" "$f" || true) ;;
              prose-header)
                COUNT=$(grep "sorry" "$f" | grep -viE "sorries|sorry.s" | wc -l || true) ;;
              standalone-tactic)
                # Count `sorry` as the sole tactic on a line, INCLUDING the
                # Lean case-bullet form `· sorry` (U+00B7). The bare
                # `^\s*sorry\s*$` regex MISSED it, so a bullet-sorry reported
                # delta 0 and silently passed the anti-regression gate (blind
                # spot, See #2747). Strip bullet bytes (c2 b7) first so BOTH
                # forms match in any locale (byte-exact, not UTF-8 dependent).
                COUNT=$(tr -d '\302\267' < "$f" | grep -cE "^\s*sorry\s*$" || true) ;;
              tactic)
                # Like standalone-tactic but ALSO strips any trailing inline
                # comment (`-- ...`) before matching, so the fixture form
                # `· sorry -- comment` is counted as the tactic it is. Closes
                # the standalone-tactic blind spot for projects whose real
                # sorries carry an inline comment (e.g. calibration_lean P4
                # targets). Prose mentions of "sorry" in docstrings/comments
                # remain excluded because they are never the sole token after
                # comment-stripping. (See #5120.)
                COUNT=$(tr -d '\302\267' < "$f" | sed 's/--.*$//' | grep -cE "^\s*sorry\s*$" || true) ;;
              *)
                echo "ERROR: unknown sorry-filter-mode '$MODE'"; exit 2 ;;
            esac
            if [ "${COUNT:-0}" -gt 0 ]; then
              echo "  $f: $COUNT"
              SORRY_TOTAL=$((SORRY_TOTAL + COUNT))
            fi
          fi
        done
        echo ""
        echo "Real sorry ($MODE): $SORRY_TOTAL"
        echo "Known baseline: $BASELINE"
        if [ "$SORRY_TOTAL" -gt "$BASELINE" ]; then
          echo ""
          echo "FAIL: sorry count ($SORRY_TOTAL) exceeds baseline ($BASELINE)"
          echo "A sorry-as-tactic was introduced. If intentional (new intractable/"
          echo "scaffolding target), raise sorry-baseline in the caller workflow WITH"
          echo "a documented justification in the PR body."
          exit 1
        fi
        echo "OK: sorry count at or below baseline ($SORRY_TOTAL <= $BASELINE)."

    - name: Install elan
      run: |
        curl -sSfL https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
        ./elan-init -y --default-toolchain none
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Cache Lake build artifacts
      uses: actions/cache@v4
      with:
        path: ${{ inputs.project-path }}/.lake
        key: lake-${{ inputs.display-name }}-${{ runner.os }}-${{ hashFiles(format('{0}/lakefile.lean', inputs.project-path), format('{0}/lakefile.toml', inputs.project-path), format('{0}/lean-toolchain', inputs.project-path)) }}
        restore-keys: lake-${{ inputs.display-name }}-${{ runner.os }}-

    - name: Lake build
      working-directory: ${{ inputs.project-path }}
      run: |
        set -o pipefail   # propagate lake's exit code through `| tail` — without this a
                          # FAILED lake build reports exit 0 (tail always succeeds), and the
                          # CI step passes regardless. See incident conway_lean HashlifeCorrectness
                          # L1058 (rfl fail masked as CI PASS, 2026-06-14).
        lake exe cache get || true
        lake -R build 2>&1 | tail -20
