name: Lean Game Defs Ext CI

# CI for lean_game_defs_ext (GameTheory/lean_game_defs_ext).
# Bayesian games formalization, phase 1+ of #2610 (Harsanyi type spaces,
# interim expected utility, decidable BNE). Core Lean 4 only, no Mathlib.
# Rule lean-merge-discipline: lake build SUCCESS local OBLIGATOIRE avant merge.
#
# Caller of the reusable lean-build.yml (merged via PR #2751).
# Baseline 0: all theorems fully proved, no sorry tolerated.

on:
  push:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/GameTheory/lean_game_defs_ext/**.lean'
      - 'MyIA.AI.Notebooks/GameTheory/lean_game_defs_ext/lakefile.toml'
      - 'MyIA.AI.Notebooks/GameTheory/lean_game_defs_ext/lean-toolchain'
  pull_request:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/GameTheory/lean_game_defs_ext/**.lean'
      - 'MyIA.AI.Notebooks/GameTheory/lean_game_defs_ext/lakefile.toml'
      - 'MyIA.AI.Notebooks/GameTheory/lean_game_defs_ext/lean-toolchain'
  workflow_dispatch:

jobs:
  ci:
    uses: jsboige/CoursIA/.github/workflows/lean-build.yml@main
    with:
      project-path: MyIA.AI.Notebooks/GameTheory/lean_game_defs_ext
      display-name: lean_game_defs_ext
      sorry-baseline: "0"
      sorry-filter-mode: standalone-tactic
