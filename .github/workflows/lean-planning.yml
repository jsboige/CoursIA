name: Lean CI (planning_lean)

# CI for planning_lean (SymbolicAI/Planners/planning_lean) — admissibilité de la
# relaxation sans-delete (h⁺) en planification STRIPS : le coût du plan relaxé optimal
# h⁺ n'excède jamais le coût réel optimal h* (tout plan réel est un plan relaxé, car la
# relaxation ignore les effets de deletion et l'état relaxé ne fait que croître).
# Justifie formellement les heuristiques de relaxation h_max/h_add/FF. Premier Lean lake
# de la série Planning (roadmap #4038 Tier 2, issue #4053).
#
# sorry-filter-mode=standalone-tactic, baseline=0 : la bibliothèque est intégralement
# sans sorry ; le théorème phare `relaxed_plan_admissible` (h⁺ ≤ h*) et les lemmas de
# support (`run_subset_runR`, `runR_mono`) sont prouvés. Ce CI garde qu'AUCUN nouveau
# `sorry` tactic standalone n'est introduit (jamais de faux positif sur les mentions
# prose « non-sorry »/« 0 sorry » ; rattrape tout nouveau sorry standalone).

on:
  push:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/SymbolicAI/Planners/planning_lean/**.lean'
      - 'MyIA.AI.Notebooks/SymbolicAI/Planners/planning_lean/lakefile.lean'
      - 'MyIA.AI.Notebooks/SymbolicAI/Planners/planning_lean/lakefile.toml'
      - 'MyIA.AI.Notebooks/SymbolicAI/Planners/planning_lean/lean-toolchain'
  pull_request:
    branches: [main]
    paths:
      - 'MyIA.AI.Notebooks/SymbolicAI/Planners/planning_lean/**.lean'
      - 'MyIA.AI.Notebooks/SymbolicAI/Planners/planning_lean/lakefile.lean'
      - 'MyIA.AI.Notebooks/SymbolicAI/Planners/planning_lean/lakefile.toml'
      - 'MyIA.AI.Notebooks/SymbolicAI/Planners/planning_lean/lean-toolchain'
  workflow_dispatch:

jobs:
  ci:
    uses: jsboige/CoursIA/.github/workflows/lean-build.yml@main
    with:
      project-path: MyIA.AI.Notebooks/SymbolicAI/Planners/planning_lean
      display-name: planning_lean
      sorry-baseline: "0"
      sorry-filter-mode: standalone-tactic
