services:
  nanoclaw:
    image: nanoclaw:latest
    container_name: nanoclaw
    restart: unless-stopped
    env_file: nanoclaw.env
    volumes:
      - ./workspace:/app/workspace
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
