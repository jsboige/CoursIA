name = "lean_game_defs"
defaultTargets = ["LeanGameDefs"]

# Self-contained lake project (core Lean only, zero dependency).
# Added per ai-01 review on PR #2752: these shared definitions were shipped
# in #2673 without any build harness, so compilation errors were invisible.
# `lake build` here is the verification path (locally and in CI).

[[lean_lib]]
name = "LeanGameDefs"
# `Basic_en` is the English twin of `Basic` (EPIC #4980 sibling-pair, namespace
# `LeanGameDefs_en`). Listed as a root so the twin is built by CI (anti-ORPHAN-TRAP,
# cf L504 root-twin-glob-pattern). The other 5 leaves are migrated in follow-up PRs.
roots = ["Basic", "Basic_en", "Nash", "Bayesian", "Combinatorial", "SocialChoice", "Regret"]
