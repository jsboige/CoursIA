name = "lean_game_defs"
defaultTargets = ["LeanGameDefs"]

# Self-contained lake project (core Lean only, zero dependency).
# Added per ai-01 review on PR #2752: these shared definitions were shipped
# in #2673 without any build harness, so compilation errors were invisible.
# `lake build` here is the verification path (locally and in CI).

[[lean_lib]]
name = "LeanGameDefs"
# Roots include the `_en` i18n siblings (EPIC #4980 sibling-pair Pattern A) so
# that `lake build` (the CI verification path) actually compiles them — without
# an explicit root, a `*_en.lean` mirror is an orphan that Lake never builds
# and whose compile errors stay invisible. `Combinatorial_en` is self-contained
# (no import), so it builds standalone.
roots = [
  "Basic", "Nash", "Bayesian", "Combinatorial", "SocialChoice", "Regret",
  "Combinatorial_en",
]
