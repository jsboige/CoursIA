[pytest]
# Override local : on retire --import-mode=importlib (defaut pytest)
# pour permettre ``from ict import ...`` via sys.path.insert.
#
# Le pytest.ini central du repo force ``--import-mode=importlib`` qui
# ignore les sys.path.insert faits au top-level des tests. Resultat :
# ``test_reversibility_budget.py`` et ``test_time_arrow.py`` upstream
# MERGED n'ont jamais pu etre executes localement.
#
# Ici on remet le mode ``prepend`` (defaut pytest) pour que le
# sys.path.insert module-level du test fonctionne. Effet scope :
# uniquement les tests sous ``ict/tests/``.
addopts = -v --tb=short